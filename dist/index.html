<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>勇者ものがたり</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:none;-webkit-user-select:none;user-select:none}
#gameContainer{position:relative;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}
canvas{image-rendering:pixelated;image-rendering:crisp-edges}
#controls{position:fixed;bottom:10px;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-end;padding:0 16px;pointer-events:none;z-index:10}
.cb{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.5);font-size:22px;pointer-events:auto;-webkit-tap-highlight-color:transparent}
.cb:active{background:rgba(255,255,255,0.3)}
#dpad{display:grid;grid-template-columns:56px 56px 56px;grid-template-rows:56px 56px 56px;gap:3px}
#dpad .cb:nth-child(1){grid-column:2;grid-row:1}
#dpad .cb:nth-child(2){grid-column:1;grid-row:2}
#dpad .cb:nth-child(3){grid-column:3;grid-row:2}
#dpad .cb:nth-child(4){grid-column:2;grid-row:3}
#ab{display:flex;gap:10px;align-items:center;padding-bottom:28px}
#ab .cb{width:64px;height:64px;font-size:20px;font-weight:bold}
@media(hover:hover)and (pointer:fine){#controls{display:none}}
</style>
</head>
<body>
<div id="gameContainer">
<canvas id="gameCanvas" width="256" height="240"></canvas>
</div>
<div id="controls">
<div id="dpad">
<div class="cb" data-btn="up">▲</div>
<div class="cb" data-btn="left">◀</div>
<div class="cb" data-btn="right">▶</div>
<div class="cb" data-btn="down">▼</div>
</div>
<div id="ab">
<div class="cb" data-btn="b">B</div>
<div class="cb" data-btn="a">A</div>
</div>
</div>
<script src="js/data.js"></script>
<script src="js/game.js"></script>
</body>
</html>
